
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - AlphaSports</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/recuperar-senha.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="recovery-body">

<div class="recovery-card">
    <img th:src="@{/images/logoRed.png}" alt="AlphaSports" class="logo-recovery">

    <h2>Nova Senha</h2>
    <p>Escolha uma nova senha para sua conta.</p>

    <div th:if="${mensagemErro}" class="auth-alert">
        <i class="fas fa-exclamation-circle auth-alert-icon"></i>
        <span th:text="${mensagemErro}"></span>
    </div>

    <form th:action="@{/nova-senha}" method="POST">
        <!-- Passa email e código validado para o controller -->
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" name="codigo" th:value="${codigo}">

        <div class="form-group-recovery">
            <label for="senha">Nova Senha</label>
            <input type="password"
                   id="senha"
                   name="senha"
                   placeholder="Mínimo 6 caracteres"
                   minlength="6"
                   required
                   autofocus>
        </div>

        <div class="form-group-recovery">
            <label for="confirmarSenha">Confirmar Nova Senha</label>
            <input type="password"
                   id="confirmarSenha"
                   name="confirmarSenha"
                   placeholder="Repita a senha"
                   minlength="6"
                   required>
        </div>

        <button type="submit" class="btn-enviar-recovery">Redefinir Senha</button>
    </form>

    <div class="footer-recovery">
        <a th:href="@{/auth/login}">Voltar ao Login</a>
    </div>
</div>

<script>
    // Valida se as senhas coincidem antes de enviar
    document.querySelector('form').addEventListener('submit', function(e) {
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;
        if (senha !== confirmar) {
            e.preventDefault();
            alert('As senhas não coincidem!');
        }
    });
</script>

</body>
</html>

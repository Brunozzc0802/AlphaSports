<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaSports - Recuperar Senha</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" th:href="@{/css/recuperar-senha.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="recovery-body">

<div class="recovery-card">
  <img th:src="@{/images/logoRed.png}" alt="AlphaSports" class="logo-recovery">

  <h2>Recuperar Senha</h2>
  <p>Insira seu e-mail cadastrado e enviaremos um código de verificação.</p>

  <div th:if="${mensagemErro}" class="auth-alert">
    <i class="fas fa-exclamation-circle auth-alert-icon"></i>
    <span th:text="${mensagemErro}"></span>
  </div>

  <form th:action="@{/esqueceu-senha}" method="POST">
    <div class="form-group-recovery">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
    </div>
    <button type="submit" class="btn-enviar-recovery">Enviar Código</button>
  </form>

  <div class="footer-recovery">
    Lembrou a senha? <a th:href="@{/auth/login}">Fazer Login</a>
  </div>
</div>

</body>
</html>
